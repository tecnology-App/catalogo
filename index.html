<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --azul-dark: #1a2d6b;
  --azul-light: #00aadf;
  --azul-mid: #1565C0;
  --gris-fondo: #f4f7fb;
  --gris-texto: #4a5568;
  --gris-borde: #e2e8f0;
  --sombra: 0 4px 20px rgba(0,0,0,0.08);
  --sombra-hover: 0 8px 32px rgba(0,170,223,0.18);
  --radio: 18px;
  --radio-sm: 10px;
  --max-width: 1200px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: var(--gris-fondo); color: var(--gris-texto); min-height: 100vh; }

/* LOADER */
#loader { position: fixed; inset: 0; background: var(--azul-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; gap: 18px; }
.loader-text { color: #fff; font-size: 15px; letter-spacing: 1px; opacity: .8; }
.loader-dots span { display: inline-block; width: 8px; height: 8px; background: var(--azul-light); border-radius: 50%; margin: 0 3px; animation: bounce 1s infinite; }
.loader-dots span:nth-child(2){animation-delay:.2s} .loader-dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ERROR */
#error-msg { display: none; text-align: center; padding: 80px 20px; }
#error-msg .error-icon { font-size: 64px; margin-bottom: 16px; }
#error-msg h2 { color: var(--azul-dark); font-size: 24px; margin-bottom: 8px; }
#error-msg p { color: #999; font-size: 15px; }

/* HEADER */
#store-header { background: linear-gradient(135deg, var(--azul-dark) 0%, var(--azul-mid) 60%, var(--azul-light) 100%); padding: 28px 24px 24px; display: none; }
.header-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; gap: 20px; }
.store-logo-wrap { width: 72px; height: 72px; border-radius: 16px; background: #fff; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 16px rgba(0,0,0,0.18); display: flex; align-items: center; justify-content: center; }
.store-logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.store-logo-placeholder { width: 100%; height: 100%; background: linear-gradient(135deg, var(--azul-light), var(--azul-dark)); display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; font-weight: 900; font-family: 'Nunito', sans-serif; }
.store-info { flex: 1; }
.store-name { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; color: #fff; line-height: 1.2; }
.store-owner { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 3px; }
.store-moneda { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
.store-wa-btn { display: inline-flex; align-items: center; gap: 7px; background: #25D366; color: #fff; border: none; border-radius: 50px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; margin-top: 10px; box-shadow: 0 3px 12px rgba(37,211,102,0.35); transition: transform .15s, box-shadow .15s; }
.store-wa-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(37,211,102,0.4); }
.wa-icon { width: 18px; height: 18px; }

/* HEADER DESKTOP */
@media(min-width: 768px) {
  #store-header { padding: 36px 32px 30px; }
  .header-inner { gap: 28px; }
  .store-logo-wrap { width: 96px; height: 96px; border-radius: 20px; }
  .store-logo-placeholder { font-size: 38px; }
  .store-name { font-size: 30px; }
  .store-owner { font-size: 15px; }
  .store-wa-btn { padding: 11px 24px; font-size: 14px; }
  .header-actions { display: flex; gap: 12px; align-items: center; margin-top: 12px; }
}

/* FILTROS */
#filters-section { background: #fff; border-bottom: 1px solid var(--gris-borde); padding: 14px 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
.filters-inner { max-width: var(--max-width); margin: 0 auto; }
.filter-label { font-size: 11px; font-weight: 700; color: var(--azul-dark); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.chips-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.chips-row::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 6px 14px; border-radius: 50px; border: 2px solid var(--gris-borde); background: #fff; font-size: 12px; font-weight: 600; color: var(--gris-texto); cursor: pointer; transition: all .2s; white-space: nowrap; }
.chip.active { background: var(--azul-dark); border-color: var(--azul-dark); color: #fff; }
.chip:hover:not(.active) { border-color: var(--azul-light); color: var(--azul-light); }
.sub-chips-row { display: none; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-top: 8px; scrollbar-width: none; }
.sub-chips-row.visible { display: flex; }
.sub-chips-row::-webkit-scrollbar { display: none; }
.sub-chip { flex-shrink: 0; padding: 5px 12px; border-radius: 50px; border: 1.5px solid var(--gris-borde); background: #fff; font-size: 11px; font-weight: 600; color: var(--gris-texto); cursor: pointer; transition: all .2s; white-space: nowrap; }
.sub-chip.active { background: var(--azul-light); border-color: var(--azul-light); color: #fff; }
.search-wrap { margin-top: 10px; position: relative; }
.search-wrap input { width: 100%; padding: 10px 16px 10px 40px; border: 2px solid var(--gris-borde); border-radius: 50px; font-size: 14px; font-family: 'Poppins', sans-serif; outline: none; transition: border-color .2s; background: var(--gris-fondo); }
.search-wrap input:focus { border-color: var(--azul-light); background: #fff; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #aaa; }

/* FILTROS DESKTOP */
@media(min-width: 768px) {
  #filters-section { padding: 16px 24px; }
  .filters-desktop { display: flex; gap: 20px; align-items: flex-start; }
  .filters-left { flex: 1; }
  .search-wrap { margin-top: 0; width: 320px; flex-shrink: 0; }
}

/* CONTEO */
.results-count { max-width: var(--max-width); margin: 14px auto 0; padding: 0 16px; font-size: 12px; color: #999; font-weight: 600; display: none; }

/* GRID */
#productos-grid { max-width: var(--max-width); margin: 0 auto; padding: 14px 12px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(min-width: 480px) { #productos-grid { grid-template-columns: repeat(3, 1fr); } }
@media(min-width: 768px) { #productos-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px 24px 80px; } }
@media(min-width: 1024px) { #productos-grid { grid-template-columns: repeat(4, 1fr); } }
@media(min-width: 1280px) { #productos-grid { grid-template-columns: repeat(5, 1fr); } }

/* CARD */
.product-card { background: #fff; border-radius: var(--radio); box-shadow: var(--sombra); overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; animation: fadeUp .4s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.product-card:hover { transform: translateY(-4px); box-shadow: var(--sombra-hover); }

/* CARRUSEL CARD */
.card-carousel { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #eef2f7; }
.carousel-track { display: flex; height: 100%; transition: transform .35s cubic-bezier(.4,0,.2,1); }
.carousel-slide { flex-shrink: 0; width: 100%; height: 100%; }
.carousel-slide img { width: 100%; height: 100%; object-fit: cover; }
.carousel-slide .no-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 48px; color: #ccd; }
.carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: opacity .2s; opacity: 0; z-index: 2; }
.card-carousel:hover .carousel-btn { opacity: 1; }
.carousel-btn.prev { left: 6px; } .carousel-btn.next { right: 6px; }
.carousel-dots { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: background .2s; }
.dot.active { background: #fff; }

/* BADGES */
.badge-wrap { position: absolute; top: 8px; left: 8px; display: flex; flex-direction: column; gap: 4px; z-index: 3; }
.badge { font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 50px; letter-spacing: .5px; text-transform: uppercase; }
.badge-anuncio { background: linear-gradient(90deg, #ff6b35, #ff4757); color: #fff; box-shadow: 0 2px 8px rgba(255,71,87,.35); }
.badge-agotado { background: #e53e3e; color: #fff; box-shadow: 0 2px 8px rgba(229,62,62,.35); }
.badge-ultimas { background: #dd6b20; color: #fff; box-shadow: 0 2px 8px rgba(221,107,32,.35); }
.badge-disponible { background: #38a169; color: #fff; box-shadow: 0 2px 8px rgba(56,161,105,.35); }

/* CARD BODY */
.card-body { padding: 12px 12px 10px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.card-codigo { font-size: 10px; color: #aaa; font-weight: 600; letter-spacing: .5px; }
.card-nombre { font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; color: var(--azul-dark); line-height: 1.25; }
.card-cat { font-size: 10px; color: var(--azul-light); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; }
.card-tallas { font-size: 11px; color: #888; margin-top: 2px; }
.card-precio { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--azul-dark); margin-top: 4px; }
.card-precio.agotado { color: #aaa; text-decoration: line-through; font-size: 14px; }

/* CARD FOOTER */
.card-footer { padding: 0 12px 12px; display: flex; justify-content: flex-end; }
.wa-card-btn { display: flex; align-items: center; gap: 5px; background: #25D366; color: #fff; border: none; border-radius: 50px; padding: 7px 14px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; transition: transform .15s; }
.wa-card-btn:hover { transform: scale(1.05); }
.wa-card-btn svg { width: 14px; height: 14px; }
.wa-card-btn.disabled { background: #ccc; pointer-events: none; }

/* MODAL */
#modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,50,0.6); z-index: 1000; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
#modal-overlay.open { display: flex; }
#modal-box { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding-bottom: 30px; animation: slideUp .35s cubic-bezier(.4,0,.2,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
@media(min-width: 768px) {
  #modal-overlay { align-items: center; }
  #modal-box { border-radius: 24px; max-height: 85vh; }
}
.modal-close-btn { position: sticky; top: 0; z-index: 10; display: flex; justify-content: flex-end; padding: 14px 16px 0; background: #fff; }
.modal-close-btn button { background: var(--gris-fondo); border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #666; }

/* CARRUSEL MODAL */
.modal-carousel { position: relative; aspect-ratio: 1/1; overflow: hidden; background: #eef; margin-top: -10px; }
.modal-track { display: flex; height: 100%; transition: transform .35s cubic-bezier(.4,0,.2,1); }
.modal-slide { flex-shrink: 0; width: 100%; height: 100%; }
.modal-slide img { width: 100%; height: 100%; object-fit: cover; }
.modal-slide .no-img { width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;color:#ccd; }
.modal-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(0,0,0,.2); z-index: 2; }
.modal-btn.prev { left: 10px; } .modal-btn.next { right: 10px; }
.modal-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 5px; }
.modal-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: background .2s; }
.modal-dot.active { background: #fff; }

/* INFO MODAL */
.modal-info { padding: 20px 20px 0; }
.modal-codigo { font-size: 11px; color: #aaa; font-weight: 700; letter-spacing: .8px; margin-bottom: 4px; }
.modal-nombre { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; color: var(--azul-dark); line-height: 1.2; }
.modal-precio { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 900; color: var(--azul-dark); margin: 10px 0; }
.modal-precio.agotado { color: #aaa; }
.modal-agotado-txt { font-size: 13px; color: #e53e3e; font-weight: 700; margin-bottom: 10px; }
.modal-cats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.modal-cat-tag { background: var(--gris-fondo); border-radius: 50px; padding: 4px 12px; font-size: 11px; font-weight: 700; color: var(--azul-mid); }
.modal-desc { font-size: 14px; line-height: 1.65; color: var(--gris-texto); margin-bottom: 14px; }
.modal-tallas { background: var(--gris-fondo); border-radius: var(--radio-sm); padding: 12px 14px; margin-bottom: 14px; }
.modal-tallas-title { font-size: 11px; font-weight: 700; color: var(--azul-dark); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }
.tallas-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.talla-chip { background: #fff; border: 1.5px solid var(--gris-borde); border-radius: 6px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--azul-dark); }
.modal-medidas { margin-bottom: 14px; }
.modal-medidas-title { font-size: 11px; font-weight: 700; color: var(--azul-dark); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px; }
.medidas-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.medidas-table th { background: var(--azul-dark); color: #fff; padding: 7px 10px; text-align: left; font-weight: 700; }
.medidas-table td { padding: 6px 10px; border-bottom: 1px solid var(--gris-borde); }
.medidas-table tr:nth-child(even) td { background: var(--gris-fondo); }
.modal-anuncio { background: linear-gradient(90deg, #fff3f0, #fff8f0); border: 1.5px solid #ffd0b5; border-radius: var(--radio-sm); padding: 12px 14px; margin-bottom: 14px; }
.anuncio-label { font-size: 10px; font-weight: 800; color: #ff6b35; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
.anuncio-texto { font-size: 13px; color: var(--gris-texto); line-height: 1.55; }
.modal-wa-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25D366; color: #fff; border: none; border-radius: 50px; padding: 16px; width: 100%; font-size: 16px; font-weight: 800; cursor: pointer; text-decoration: none; box-shadow: 0 4px 16px rgba(37,211,102,.35); font-family: 'Nunito', sans-serif; margin-top: 4px; transition: transform .15s, box-shadow .15s; }
.modal-wa-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,.4); }
.modal-wa-btn.disabled { background: #ccc; box-shadow: none; pointer-events: none; }
.modal-wa-btn svg { width: 22px; height: 22px; }

/* FOOTER MARCA */
#brand-footer { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); border-top: 1px solid var(--gris-borde); padding: 8px 16px; align-items: center; justify-content: center; gap: 8px; z-index: 200; backdrop-filter: blur(8px); }
#brand-footer.visible { display: flex; }
.footer-txt { font-size: 11px; color: #aaa; font-weight: 600; }
.footer-logo { height: 22px; object-fit: contain; }

/* EMPTY */
.empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { color: #aaa; font-size: 15px; }

/* DESKTOP LAYOUT AJUSTES */
@media(min-width: 768px) {
  .results-count { padding: 0 24px; }
  #brand-footer { padding: 10px 24px; }
  .footer-logo { height: 26px; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="loader-dots"><span></span><span></span><span></span></div>
  <p class="loader-text">Cargando catálogo...</p>
</div>

<div id="error-msg">
  <div class="error-icon">🏪</div>
  <h2>Tienda no encontrada</h2>
  <p>Verifica que el enlace sea correcto.</p>
</div>

<div id="store-header">
  <div class="header-inner">
    <div class="store-logo-wrap">
      <div class="store-logo-placeholder" id="store-logo-placeholder"></div>
      <img id="store-logo-img" style="display:none" alt="Logo tienda">
    </div>
    <div class="store-info">
      <div class="store-name" id="store-name">—</div>
      <div class="store-owner" id="store-owner">—</div>
      <div class="store-moneda" id="store-moneda"></div>
      <a class="store-wa-btn" id="store-wa-btn" href="#" target="_blank">
        <svg class="wa-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Contactar tienda
      </a>
    </div>
  </div>
</div>

<div id="filters-section">
  <div class="filters-inner">
    <div class="filters-desktop">
      <div class="filters-left">
        <div class="filter-label">Categorías</div>
        <div class="chips-row" id="cats-row"></div>
        <div class="sub-chips-row" id="subcats-row"></div>
      </div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Buscar producto...">
      </div>
    </div>
  </div>
</div>

<div class="results-count" id="results-count"></div>
<div id="productos-grid"></div>

<div id="brand-footer">
  <span class="footer-txt">Powered by</span>
  <img class="footer-logo" id="brand-logo" alt="TecnologyApp">
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-close-btn"><button id="modal-close">✕</button></div>
    <div class="modal-carousel">
      <div class="modal-track" id="modal-track"></div>
      <button class="modal-btn prev" id="modal-prev">‹</button>
      <button class="modal-btn next" id="modal-next">›</button>
      <div class="modal-dots" id="modal-dots"></div>
    </div>
    <div class="modal-info">
      <div class="modal-codigo" id="modal-codigo"></div>
      <div class="modal-nombre" id="modal-nombre"></div>
      <div class="modal-precio" id="modal-precio"></div>
      <div class="modal-agotado-txt" id="modal-agotado-txt" style="display:none">⚠️ Producto agotado</div>
      <div class="modal-cats" id="modal-cats"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tallas" id="modal-tallas-wrap" style="display:none">
        <div class="modal-tallas-title">Tallas disponibles</div>
        <div class="tallas-chips" id="modal-tallas"></div>
      </div>
      <div class="modal-medidas" id="modal-medidas-wrap" style="display:none">
        <div class="modal-medidas-title">Guía de medidas</div>
        <table class="medidas-table" id="modal-medidas-table"></table>
      </div>
      <div class="modal-anuncio" id="modal-anuncio-wrap" style="display:none">
        <div class="anuncio-label">🔥 Anuncio especial</div>
        <div class="anuncio-texto" id="modal-anuncio-texto"></div>
      </div>
      <a class="modal-wa-btn" id="modal-wa-btn" href="#" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        Consultar por WhatsApp
      </a>
    </div>
  </div>
</div>

<script>
const CONFIG = {
  SHEET_ID: '1fPCkfW-MqG79MySoriExnuA5pEatUD-HNXQ252DIkGU',
  HOJA_PRODUCTOS: 'PRODUCTOS',
  HOJA_USUARIOS: 'USUARIOS',
  HOJA_MEDIDAS: 'MEDIDAS_PRENDAS',
  STOCK_MINIMO_ULTIMAS: 5, // cantidad para mostrar "Últimas unidades"

  COL: {
    ID_PRODUCTO: 0,
    EMAIL_DISTRIBUIDOR: 1,
    FECHA_CREACION: 2,
    COD_INTERNO: 3,
    NOMBRE_PROD: 4,
    DESCRIPCION: 5,
    CATEGORIA: 6,
    SUB_CATEGORIA: 7,
    STOCK_INICIAL: 8,
    MONEDA_COSTO: 9,
    TALLA_EXISTENCIA: 10,
    ESTADO: 11,
    COSTO: 12,
    MARGEN: 13,
    PRECIO_WEB: 14,
    ANUNCIO_INICIA: 15,
    ANUNCIO_FINALIZA: 16,
    ANUNCIO_TEXTO: 17,
    IMAGEN1WEB: 27,
  },

  COL_USR: {
    ID_DISTRIBUIDOR: 0,
    NOMBRE_TIENDA: 1,
    NOMBRE_DUEÑO: 2,
    WHATSAPP_TIENDA: 3,
    TEL_PROPIETARIO: 4,
    EMAIL_DISTRIBUIDOR: 5,
    MONEDA: 6,
    SIMBOLO: 7,
    TIPO_CAMBIO: 8,
    PLAN: 9,
    ESTADO_PAGO: 10,
    ESTADO: 11,
    FECHA_PAGO: 12,
    LOGO_TIENDA: 13,
    LOGOWEB: 14,
  },

  COL_MED: { ID_MEDIDA: 0, ID_PRODUCTO: 1 },
  TOTAL_IMAGENES: 10,
  LOGO_TECNOLOGYAPP: 'https://drive.google.com/thumbnail?id=1URRoeTc9kiEoeDIU48sglEVXHKzk6gBI&sz=w400',
};

let todosLosProductos = [];
let productosFiltrados = [];
let tiendaData = null;
let medidasData = {};
let catActiva = 'todos';
let subCatActiva = 'todos';
let busqueda = '';
let modalIdx = 0;
let modalImgs = [];

function getParam(name) { return new URLSearchParams(window.location.search).get(name); }

function formatPrecio(val, simbolo) {
  if (!val && val !== 0) return '';
  const num = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  if (isNaN(num)) return val;
  const sim = simbolo || '';
  // Si es dólar o moneda con decimales
  if (sim.includes('USD') || sim.includes('€')) {
    return sim + num.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
  }
  return sim + num.toLocaleString('es-CR');
}

function parseDate(str) {
  if (!str) return null;
  const parts = str.split(/[\/\-]/);
  if (parts.length !== 3) return null;
  if (parts[2].length === 4) return new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
  return new Date(str);
}

function estaEnAnuncio(inicia, finaliza) {
  const hoy = new Date(); hoy.setHours(0,0,0,0);
  const di = parseDate(inicia); const df = parseDate(finaliza);
  if (!di || !df) return false;
  return hoy >= di && hoy <= df;
}

function sheetURL(hoja) { return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(hoja)}`; }

async function fetchSheet(hoja) {
  const res = await fetch(sheetURL(hoja));
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
  return { rows: json.table.rows, cols: json.table.cols };
}

function cellVal(row, idx) {
  if (!row.c || row.c[idx] === undefined || row.c[idx] === null) return '';
  const c = row.c[idx];
  if (c === null) return '';
  // Para fechas usar el valor formateado (f) no el valor raw (v)
  if (c.v !== null && c.v !== undefined) {
    const val = String(c.v);
    // Si es una fecha tipo "Date(2026,3,2)" retornar el formato legible
    if (val.startsWith('Date(')) return c.f || val;
    return val;
  }
  return c.f || '';
}

function arreglarURLDrive(url) {
  if (!url) return null;
  const match = url.match(/id=([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
  return url;
}

function getStockStatus(prod) {
  const stock = parseInt(prod.stockInicial) || 0;
  if (stock <= 0) return 'agotado';
  if (stock <= CONFIG.STOCK_MINIMO_ULTIMAS) return 'ultimas';
  return 'disponible';
}

async function cargarTodo() {
  const emailTienda = getParam('tienda');
  if (!emailTienda) { mostrarError(); return; }

  try {
    const [pData, uData] = await Promise.all([
      fetchSheet(CONFIG.HOJA_PRODUCTOS),
      fetchSheet(CONFIG.HOJA_USUARIOS),
    ]);
    const mData = await fetchSheet(CONFIG.HOJA_MEDIDAS).catch(() => null);

    const usuarioRow = uData.rows.find(r => {
      const email = cellVal(r, CONFIG.COL_USR.EMAIL_DISTRIBUIDOR);
      return email.toLowerCase().trim() === emailTienda.toLowerCase().trim();
    });
    if (!usuarioRow) { mostrarError(); return; }

    tiendaData = {
      nombre: cellVal(usuarioRow, CONFIG.COL_USR.NOMBRE_TIENDA),
      dueño: cellVal(usuarioRow, CONFIG.COL_USR.NOMBRE_DUEÑO),
      whatsapp: cellVal(usuarioRow, CONFIG.COL_USR.WHATSAPP_TIENDA),
      logo: cellVal(usuarioRow, CONFIG.COL_USR.LOGOWEB),
      email: emailTienda,
      moneda: cellVal(usuarioRow, CONFIG.COL_USR.MONEDA),
      simbolo: cellVal(usuarioRow, CONFIG.COL_USR.SIMBOLO),
      tipoCambio: cellVal(usuarioRow, CONFIG.COL_USR.TIPO_CAMBIO),
    };

    if (mData && mData.rows && mData.rows.length > 0 && mData.cols && mData.cols.length > 2) {
      try {
        const medCols = mData.cols.slice(2);
        mData.rows.forEach(r => {
          const idProd = cellVal(r, CONFIG.COL_MED.ID_PRODUCTO);
          if (!idProd) return;
          if (!medidasData[idProd]) medidasData[idProd] = { cols: medCols, filas: [] };
          medidasData[idProd].filas.push(medCols.map((_, i) => cellVal(r, i + 2)));
        });
      } catch(medErr) {
        console.warn('Medidas no disponibles:', medErr.message);
      }
    }

    console.log('Total filas PRODUCTOS:', pData.rows.length);
    console.log('Email buscado:', emailTienda);
    if (pData.rows.length > 0) {
      const primeraFila = pData.rows[0];
      console.log('Email fila1:', cellVal(primeraFila, CONFIG.COL.EMAIL_DISTRIBUIDOR));
      console.log('Estado fila1:', cellVal(primeraFila, CONFIG.COL.ESTADO));
    }

    todosLosProductos = pData.rows
      .filter(r => {
        const email = cellVal(r, CONFIG.COL.EMAIL_DISTRIBUIDOR);
        const estado = cellVal(r, CONFIG.COL.ESTADO).toLowerCase().trim();
        return email.toLowerCase().trim() === emailTienda.toLowerCase().trim() && estado === 'activo';
      })
      .map(r => {
        const imagenes = [];
        for (let i = 0; i < CONFIG.TOTAL_IMAGENES; i++) {
          const val = cellVal(r, CONFIG.COL.IMAGEN1WEB + i);
          if (!val || !val.trim()) continue;
          const url = arreglarURLDrive(val);
          if (url) imagenes.push(url);
        }
        const inicia = cellVal(r, CONFIG.COL.ANUNCIO_INICIA);
        const finaliza = cellVal(r, CONFIG.COL.ANUNCIO_FINALIZA);
        const stockInicial = parseInt(cellVal(r, CONFIG.COL.STOCK_INICIAL)) || 0;
        return {
          id: cellVal(r, CONFIG.COL.ID_PRODUCTO),
          codigo: cellVal(r, CONFIG.COL.COD_INTERNO),
          nombre: cellVal(r, CONFIG.COL.NOMBRE_PROD),
          descripcion: cellVal(r, CONFIG.COL.DESCRIPCION),
          categoria: cellVal(r, CONFIG.COL.CATEGORIA),
          subCategoria: cellVal(r, CONFIG.COL.SUB_CATEGORIA),
          tallas: cellVal(r, CONFIG.COL.TALLA_EXISTENCIA),
          precioWeb: cellVal(r, CONFIG.COL.PRECIO_WEB),
          anuncioInicia: inicia,
          anuncioFinaliza: finaliza,
          anuncioTexto: cellVal(r, CONFIG.COL.ANUNCIO_TEXTO),
          tieneAnuncio: estaEnAnuncio(inicia, finaliza),
          stockInicial,
          imagenes,
        };
      });

    console.log('Productos cargados:', todosLosProductos.length);
    renderTienda();
    renderFiltros();
    aplicarFiltros();
    console.log('Render completado');
    document.getElementById('loader').style.display = 'none';
    document.getElementById('store-header').style.display = 'block';
    document.getElementById('filters-section').style.display = 'block';
    document.getElementById('results-count').style.display = 'block';
    document.getElementById('brand-footer').classList.add('visible');
    document.getElementById('brand-logo').src = CONFIG.LOGO_TECNOLOGYAPP;

  } catch (e) {
    console.error('ERROR EN CARGA:', e.message, e.stack);
    document.getElementById('loader').style.display = 'none';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').innerHTML = '<h2>Error</h2><p>' + e.message + '</p>';
  }
}

function renderTienda() {
  const t = tiendaData;
  document.getElementById('store-name').textContent = t.nombre || 'Mi Tienda';
  document.getElementById('store-owner').textContent = t.dueño ? `👤 ${t.dueño}` : '';
  document.getElementById('store-moneda').textContent = t.moneda ? `💱 ${t.moneda} ${t.simbolo ? '— ' + t.simbolo : ''}` : '';
  document.title = t.nombre || 'Catálogo';

  if (t.logo && t.logo.startsWith('http')) {
    const img = document.getElementById('store-logo-img');
    img.src = t.logo; img.style.display = 'block';
    document.getElementById('store-logo-placeholder').style.display = 'none';
  } else {
    document.getElementById('store-logo-placeholder').textContent = (t.nombre || 'T').charAt(0).toUpperCase();
  }

  const waBtn = document.getElementById('store-wa-btn');
  if (t.whatsapp) {
    const num = t.whatsapp.replace(/\D/g, '');
    waBtn.href = `https://wa.me/${num}?text=Hola!%20Vi%20tu%20cat%C3%A1logo%20y%20quiero%20m%C3%A1s%20informaci%C3%B3n.`;
  } else { waBtn.style.display = 'none'; }
}

function renderFiltros() {
  const cats = ['todos', ...new Set(todosLosProductos.map(p => p.categoria).filter(Boolean))];
  const catsRow = document.getElementById('cats-row');
  catsRow.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (cat === catActiva ? ' active' : '');
    chip.textContent = cat === 'todos' ? 'Todos' : cat;
    chip.onclick = () => { catActiva = cat; subCatActiva = 'todos'; renderFiltros(); aplicarFiltros(); };
    catsRow.appendChild(chip);
  });

  const subCatsRow = document.getElementById('subcats-row');
  subCatsRow.innerHTML = '';
  if (catActiva !== 'todos') {
    const subCats = ['todos', ...new Set(todosLosProductos.filter(p => p.categoria === catActiva).map(p => p.subCategoria).filter(Boolean))];
    if (subCats.length > 1) {
      subCatsRow.classList.add('visible');
      subCats.forEach(sub => {
        const chip = document.createElement('div');
        chip.className = 'sub-chip' + (sub === subCatActiva ? ' active' : '');
        chip.textContent = sub === 'todos' ? 'Todas' : sub;
        chip.onclick = () => { subCatActiva = sub; renderFiltros(); aplicarFiltros(); };
        subCatsRow.appendChild(chip);
      });
    } else { subCatsRow.classList.remove('visible'); }
  } else { subCatsRow.classList.remove('visible'); }
}

function aplicarFiltros() {
  productosFiltrados = todosLosProductos.filter(p => {
    const matchCat = catActiva === 'todos' || p.categoria === catActiva;
    const matchSub = subCatActiva === 'todos' || p.subCategoria === subCatActiva;
    const matchBusq = !busqueda || p.nombre.toLowerCase().includes(busqueda) || p.descripcion.toLowerCase().includes(busqueda) || p.codigo.toLowerCase().includes(busqueda);
    return matchCat && matchSub && matchBusq;
  });
  const count = document.getElementById('results-count');
  count.textContent = `${productosFiltrados.length} producto${productosFiltrados.length !== 1 ? 's' : ''}`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('productos-grid');
  grid.innerHTML = '';
  if (productosFiltrados.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">📦</div><p>No hay productos en esta categoría</p></div>`;
    return;
  }
  productosFiltrados.forEach((prod, i) => grid.appendChild(crearCard(prod, i)));
}

function crearCard(prod, animIdx) {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.style.animationDelay = `${animIdx * 0.05}s`;

  const stockStatus = getStockStatus(prod);
  const imgs = prod.imagenes.length ? prod.imagenes : [null];
  let idxActual = 0;

  // Carrusel
  const carousel = document.createElement('div');
  carousel.className = 'card-carousel';
  const track = document.createElement('div');
  track.className = 'carousel-track';
  imgs.forEach(img => {
    const slide = document.createElement('div'); slide.className = 'carousel-slide';
    if (img) { const i = document.createElement('img'); i.src = img; i.alt = prod.nombre; i.loading = 'lazy'; slide.appendChild(i); }
    else { slide.innerHTML = '<div class="no-img">📷</div>'; }
    track.appendChild(slide);
  });
  carousel.appendChild(track);

  if (imgs.length > 1) {
    const dots = document.createElement('div'); dots.className = 'carousel-dots';
    imgs.forEach((_, di) => { const d = document.createElement('div'); d.className = 'dot' + (di === 0 ? ' active' : ''); dots.appendChild(d); });
    carousel.appendChild(dots);
    const actualizarDots = () => dots.querySelectorAll('.dot').forEach((d, di) => d.classList.toggle('active', di === idxActual));
    const prev = document.createElement('button'); prev.className = 'carousel-btn prev'; prev.textContent = '‹';
    prev.onclick = e => { e.stopPropagation(); idxActual = (idxActual - 1 + imgs.length) % imgs.length; track.style.transform = `translateX(-${idxActual * 100}%)`; actualizarDots(); };
    const next = document.createElement('button'); next.className = 'carousel-btn next'; next.textContent = '›';
    next.onclick = e => { e.stopPropagation(); idxActual = (idxActual + 1) % imgs.length; track.style.transform = `translateX(-${idxActual * 100}%)`; actualizarDots(); };
    carousel.appendChild(prev); carousel.appendChild(next);
  }

  // Badges
  const badgeWrap = document.createElement('div'); badgeWrap.className = 'badge-wrap';
  if (prod.tieneAnuncio) { const b = document.createElement('div'); b.className = 'badge badge-anuncio'; b.textContent = '🔥 Oferta'; badgeWrap.appendChild(b); }
  if (stockStatus === 'agotado') { const b = document.createElement('div'); b.className = 'badge badge-agotado'; b.textContent = 'Agotado'; badgeWrap.appendChild(b); }
  else if (stockStatus === 'ultimas') { const b = document.createElement('div'); b.className = 'badge badge-ultimas'; b.textContent = '⚡ Últimas'; badgeWrap.appendChild(b); }
  carousel.appendChild(badgeWrap);
  card.appendChild(carousel);

  // Body
  const body = document.createElement('div'); body.className = 'card-body';
  const precioFormateado = formatPrecio(prod.precioWeb, tiendaData.simbolo);
  body.innerHTML = `
    <div class="card-codigo">#${prod.codigo || prod.id}</div>
    <div class="card-nombre">${prod.nombre}</div>
    <div class="card-cat">${[prod.categoria, prod.subCategoria].filter(Boolean).join(' › ')}</div>
    ${prod.tallas ? `<div class="card-tallas">📏 ${prod.tallas}</div>` : ''}
    <div class="card-precio ${stockStatus === 'agotado' ? 'agotado' : ''}">${precioFormateado || '—'}</div>
  `;
  card.appendChild(body);

  // Footer WA
  const footer = document.createElement('div'); footer.className = 'card-footer';
  const waNum = tiendaData.whatsapp ? tiendaData.whatsapp.replace(/\D/g, '') : '';
  const waMsg = `Hola! Me interesa el producto *${prod.nombre}* (Código: ${prod.codigo || prod.id}). ¿Tienen disponibilidad?`;
  const waLink = document.createElement('a');
  waLink.className = 'wa-card-btn' + (stockStatus === 'agotado' ? ' disabled' : '');
  waLink.href = waNum && stockStatus !== 'agotado' ? `https://wa.me/${waNum}?text=${encodeURIComponent(waMsg)}` : '#';
  waLink.target = '_blank';
  waLink.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> ${stockStatus === 'agotado' ? 'Agotado' : 'Consultar'}`;
  waLink.onclick = e => e.stopPropagation();
  footer.appendChild(waLink);
  card.appendChild(footer);
  card.onclick = () => abrirModal(prod);
  return card;
}

function abrirModal(prod) {
  const stockStatus = getStockStatus(prod);
  modalImgs = prod.imagenes.length ? prod.imagenes : [null];
  modalIdx = 0;
  const track = document.getElementById('modal-track');
  track.innerHTML = '';
  modalImgs.forEach(img => {
    const slide = document.createElement('div'); slide.className = 'modal-slide';
    if (img) { const i = document.createElement('img'); i.src = img; i.alt = prod.nombre; slide.appendChild(i); }
    else { slide.innerHTML = '<div class="no-img">📷</div>'; }
    track.appendChild(slide);
  });
  actualizarModalCarrusel();

  document.getElementById('modal-codigo').textContent = `Código: #${prod.codigo || prod.id}`;
  document.getElementById('modal-nombre').textContent = prod.nombre;
  const precioEl = document.getElementById('modal-precio');
  precioEl.textContent = formatPrecio(prod.precioWeb, tiendaData.simbolo) || '—';
  precioEl.className = 'modal-precio' + (stockStatus === 'agotado' ? ' agotado' : '');
  document.getElementById('modal-agotado-txt').style.display = stockStatus === 'agotado' ? 'block' : 'none';

  const catsEl = document.getElementById('modal-cats'); catsEl.innerHTML = '';
  [prod.categoria, prod.subCategoria].filter(Boolean).forEach(c => { const tag = document.createElement('div'); tag.className = 'modal-cat-tag'; tag.textContent = c; catsEl.appendChild(tag); });
  document.getElementById('modal-desc').textContent = prod.descripcion || '';

  const tallasWrap = document.getElementById('modal-tallas-wrap');
  if (prod.tallas) {
    tallasWrap.style.display = 'block';
    const tallasEl = document.getElementById('modal-tallas'); tallasEl.innerHTML = '';
    prod.tallas.split(/[,\s]+/).filter(Boolean).forEach(t => { const chip = document.createElement('div'); chip.className = 'talla-chip'; chip.textContent = t; tallasEl.appendChild(chip); });
  } else { tallasWrap.style.display = 'none'; }

  const medidasWrap = document.getElementById('modal-medidas-wrap');
  const medidas = medidasData[prod.id];
  if (medidas && medidas.filas.length > 0) {
    medidasWrap.style.display = 'block';
    const tabla = document.getElementById('modal-medidas-table');
    const encabezados = medidas.cols.map(c => c.label || c).filter(Boolean);
    tabla.innerHTML = `<tr>${encabezados.map(h => `<th>${h}</th>`).join('')}</tr>` + medidas.filas.map(f => `<tr>${f.map(v => `<td>${v}</td>`).join('')}</tr>`).join('');
  } else { medidasWrap.style.display = 'none'; }

  const anuncioWrap = document.getElementById('modal-anuncio-wrap');
  if (prod.tieneAnuncio && prod.anuncioTexto) { anuncioWrap.style.display = 'block'; document.getElementById('modal-anuncio-texto').textContent = prod.anuncioTexto; }
  else { anuncioWrap.style.display = 'none'; }

  const waNum = tiendaData.whatsapp ? tiendaData.whatsapp.replace(/\D/g, '') : '';

}

function cerrarModal() { document.getElementById('modal-overlay').classList.remove('open'); document.body.style.overflow = ''; }

function actualizarModalCarrusel() {
  document.getElementById('modal-track').style.transform = `translateX(-${modalIdx * 100}%)`;
  const dots = document.getElementById('modal-dots'); dots.innerHTML = '';
  modalImgs.forEach((_, i) => { const d = document.createElement('div'); d.className = 'modal-dot' + (i === modalIdx ? ' active' : ''); dots.appendChild(d); });
}

document.getElementById('modal-close').onclick = cerrarModal;
document.getElementById('modal-overlay').onclick = e => { if (e.target === e.currentTarget) cerrarModal(); };
document.getElementById('modal-prev').onclick = () => { modalIdx = (modalIdx - 1 + modalImgs.length) % modalImgs.length; actualizarModalCarrusel(); };
document.getElementById('modal-next').onclick = () => { modalIdx = (modalIdx + 1) % modalImgs.length; actualizarModalCarrusel(); };
document.getElementById('search-input').oninput = e => { busqueda = e.target.value.toLowerCase().trim(); aplicarFiltros(); };

function mostrarError() { document.getElementById('loader').style.display = 'none'; document.getElementById('error-msg').style.display = 'block'; }

cargarTodo();
